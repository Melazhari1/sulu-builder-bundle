<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sulu XML Template Builder</title>
<link rel="icon" href="icons/favicon.svg" type="image/svg+xml">
<link rel="stylesheet" href="css/styles.css">
</head>
<body>

<!-- ======================= TOP TOOLBAR ======================= -->
<header class="toolbar" id="toolbar">
  <div class="toolbar-left">
    <div class="app-logo" title="Sulu XML Template Builder">
      <svg viewBox="0 0 24 24" width="22" height="22"><path fill="#52b6ca" d="M12 2 2 7v10l10 5 10-5V7L12 2zm0 2.2 7.6 3.8L12 11.8 4.4 8 12 4.2zM4 9.6l7 3.5v6.7l-7-3.5V9.6zm16 0v6.7l-7 3.5v-6.7l7-3.5z"/></svg>
      <span>Sulu<b>Builder</b></span>
    </div>
    <div class="toolbar-sep"></div>
    <button class="tb-btn" id="btn-undo" title="Undo (Ctrl+Z)" disabled>
      <svg viewBox="0 0 24 24"><path d="M9 14 4 9l5-5"/><path d="M4 9h10.5a5.5 5.5 0 0 1 0 11H11"/></svg>
    </button>
    <button class="tb-btn" id="btn-redo" title="Redo (Ctrl+Y)" disabled>
      <svg viewBox="0 0 24 24"><path d="m15 14 5-5-5-5"/><path d="M20 9H9.5a5.5 5.5 0 0 0 0 11H13"/></svg>
    </button>
    <div class="toolbar-sep"></div>
    <button class="tb-btn" id="btn-new" title="New project">
      <svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><path d="M14 2v6h6"/><path d="M12 18v-6M9 15h6"/></svg>
    </button>
    <button class="tb-btn" id="btn-save-json" title="Export project as JSON (Ctrl+S)">
      <svg viewBox="0 0 24 24"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><path d="M17 21v-8H7v8M7 3v5h8"/></svg>
    </button>
    <button class="tb-btn" id="btn-load-json" title="Load project JSON (Ctrl+O)">
      <svg viewBox="0 0 24 24"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg>
    </button>
    <button class="tb-btn" id="btn-import-xml" title="Import existing Sulu XML">
      <svg viewBox="0 0 24 24"><path d="M12 3v12"/><path d="m7 10 5 5 5-5"/><path d="M5 21h14"/></svg>
      <span>Import XML</span>
    </button>
  </div>

  <div class="toolbar-center">
    <select id="template-type-select" class="template-type" title="Template type — decides the generated XML root">
      <option value="page">Page template</option>
      <option value="form">Form</option>
      <option value="list">List view</option>
      <option value="fragment">Fragment</option>
    </select>
    <input type="text" id="template-key-input" class="template-key" title="Template key" spellcheck="false">
  </div>

  <div class="toolbar-right">
    <div class="validation-badge" id="validation-badge" title="Validation status">
      <svg viewBox="0 0 24 24"><path d="M20 6 9 17l-5-5"/></svg>
      <span id="validation-badge-text">Valid</span>
    </div>
    <div class="toolbar-sep"></div>
    <button class="tb-btn" id="btn-theme" title="Toggle dark / light mode">
      <svg viewBox="0 0 24 24" class="icon-moon"><path d="M21 12.8A9 9 0 1 1 11.2 3 7 7 0 0 0 21 12.8z"/></svg>
      <svg viewBox="0 0 24 24" class="icon-sun"><circle cx="12" cy="12" r="4"/><path d="M12 2v2m0 16v2M4.9 4.9l1.4 1.4m11.4 11.4 1.4 1.4M2 12h2m16 0h2M4.9 19.1l1.4-1.4M17.7 6.3l1.4-1.4"/></svg>
    </button>
    <button class="tb-btn" id="btn-toggle-xml" title="Toggle live XML preview (Ctrl+E)">
      <svg viewBox="0 0 24 24"><path d="m16 18 6-6-6-6M8 6l-6 6 6 6"/></svg>
      <span>XML</span>
    </button>
    <button class="tb-btn tb-btn-primary" id="btn-generate" title="Generate XML (Ctrl+G)">
      <svg viewBox="0 0 24 24"><path d="M13 2 3 14h7l-1 8 10-12h-7l1-8z"/></svg>
      <span>Generate XML</span>
    </button>
  </div>
</header>

<!-- ======================= MAIN LAYOUT ======================= -->
<main class="workspace">

  <!-- LEFT: component palette -->
  <aside class="panel panel-left" id="panel-left">
    <div class="panel-header">
      <span class="panel-title">Components</span>
    </div>
    <div class="palette-search">
      <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/></svg>
      <input type="text" id="palette-search" placeholder="Search components… (Ctrl+F)" spellcheck="false">
    </div>
    <div class="palette" id="palette"></div>
    <div class="palette-footer">
      <button class="btn-ghost" id="btn-add-custom">
        <svg viewBox="0 0 24 24"><path d="M12 5v14M5 12h14"/></svg>
        Add custom type
      </button>
    </div>
  </aside>

  <!-- CENTER: canvas -->
  <section class="panel panel-center" id="panel-center">
    <div class="canvas-topbar">
      <nav class="breadcrumb" id="breadcrumb"></nav>
      <div class="canvas-topbar-right">
        <span class="hint-kbd">Del delete · Ctrl+D duplicate · Ctrl+Z undo</span>
      </div>
    </div>
    <div class="canvas-scroll" id="canvas-scroll">
      <div class="canvas" id="canvas"></div>
    </div>
    <!-- XML live preview drawer -->
    <div class="xml-drawer" id="xml-drawer">
      <div class="xml-drawer-header">
        <span class="xml-drawer-title">
          <svg viewBox="0 0 24 24"><path d="m16 18 6-6-6-6M8 6l-6 6 6 6"/></svg>
          Live XML preview
        </span>
        <div class="xml-drawer-actions">
          <button class="btn-ghost" id="btn-copy-xml" title="Copy XML to clipboard">
            <svg viewBox="0 0 24 24"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
            Copy
          </button>
          <button class="btn-ghost" id="btn-download-xml" title="Download .xml file">
            <svg viewBox="0 0 24 24"><path d="M12 3v12"/><path d="m7 10 5 5 5-5"/><path d="M5 21h14"/></svg>
            Download
          </button>
          <button class="btn-ghost" id="btn-close-xml" title="Close preview">
            <svg viewBox="0 0 24 24"><path d="M18 6 6 18M6 6l12 12"/></svg>
          </button>
        </div>
      </div>
      <pre class="xml-code" id="xml-code"></pre>
    </div>
  </section>

  <!-- RIGHT: inspector -->
  <aside class="panel panel-right" id="panel-right">
    <div class="panel-header">
      <span class="panel-title" id="inspector-title">Template Settings</span>
    </div>
    <div class="inspector" id="inspector"></div>
  </aside>
</main>

<!-- ======================= STATUS BAR ======================= -->
<footer class="statusbar">
  <button class="status-item" id="status-validation">
    <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/><path d="M12 8v4m0 4h.01"/></svg>
    <span id="status-validation-text">0 problems</span>
  </button>
  <span class="status-item" id="status-count">0 properties</span>
  <span class="status-spacer"></span>
  <span class="status-item" id="status-autosave">autosaved</span>
  <span class="status-item" id="status-schema">Sulu template schema 1.0</span>
</footer>

<!-- ======================= PROBLEMS POPOVER ======================= -->
<div class="problems-pop" id="problems-pop" hidden>
  <div class="problems-pop-header">Problems</div>
  <ul class="problems-list" id="problems-list"></ul>
</div>

<!-- ======================= MODALS ======================= -->
<div class="modal-backdrop" id="modal-backdrop" hidden>
  <div class="modal" id="modal" role="dialog" aria-modal="true">
    <div class="modal-header">
      <span id="modal-title">Modal</span>
      <button class="btn-ghost" id="modal-close"><svg viewBox="0 0 24 24"><path d="M18 6 6 18M6 6l12 12"/></svg></button>
    </div>
    <div class="modal-body" id="modal-body"></div>
    <div class="modal-footer" id="modal-footer"></div>
  </div>
</div>

<div class="toast-stack" id="toast-stack"></div>

<input type="file" id="file-input" hidden>

<script type="module" src="js/app.js"></script>
<script type="module" src="js/suluBridge.js"></script>
</body>
</html>
